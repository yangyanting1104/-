<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>光影蝴蝶大探險 - 多功能水彩學習網頁</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入適合唯美優雅風格的 Google 字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Serif+TC:wght@500;900&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Playfair Display', 'Noto Serif TC', serif;
            overflow-x: hidden;
            user-select: none;
            background-color: #fcf8f2;
        }

        /* 水彩漸層背景 */
        .watercolor-bg {
            background: linear-gradient(180deg, #fffcf9 0%, #fff2f2 50%, #fed7aa 100%);
        }

        /* 紙張紋理質感與手繪撕紙邊框 */
        .sketchy-canvas {
            background-color: rgba(255, 254, 251, 0.85);
            border: 2px solid #5c4033;
            border-radius: 40px 25px 35px 30px/30px 35px 25px 40px;
            box-shadow: 10px 12px 0px rgba(92, 64, 51, 0.08), inset 0 0 30px rgba(255, 255, 255, 0.9);
        }

        /* 唯美水彩卡片 */
        .watercolor-card {
            background-color: #fffdfb;
            border: 2px solid #5c4033;
            border-radius: 20px 12px 24px 16px/14px 24px 12px 20px;
            box-shadow: 3px 4px 0px #5c4033;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
        }

        /* 【智慧連結】溫習時卡片的亮色呼吸燈動畫 */
        @keyframes card-pulse {
            0%, 100% { border-color: #5c4033; box-shadow: 3px 4px 0px #5c4033; transform: scale(1); }
            50% { border-color: #f43f5e; box-shadow: 0 0 20px rgba(244, 63, 94, 0.6); transform: scale(1.03); }
        }
        .highlight-pulse {
            animation: card-pulse 1.2s ease-in-out 3; /* 呼吸閃爍 3 次 */
            z-index: 40;
        }

        /* 優雅分頁標籤按鈕 */
        .tab-btn {
            font-family: 'Noto Serif TC', serif;
            border: 2px solid #5c4033;
            border-bottom: none;
            border-radius: 16px 16px 0 0;
            background-color: rgba(255, 253, 249, 0.5);
            color: #7a5e4e;
            transition: all 0.25s ease;
        }

        .tab-btn.active {
            background-color: rgba(255, 253, 249, 1);
            color: #5c4033;
            font-weight: 900;
            padding-bottom: 8px;
            transform: translateY(2px);
            box-shadow: 0 -4px 10px rgba(92, 64, 51, 0.05);
        }

        /* 鍵盤小圖示 */
        .keycap {
            background-color: #faf6f0;
            color: #5c4033;
            border: 1.5px solid #5c4033;
            border-bottom-width: 3.5px;
            border-radius: 5px;
            padding: 1px 4px;
            font-family: 'Quicksand', sans-serif;
            font-size: 10px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transform: translateY(-1px);
        }

        /* 彩繪玻璃翅膀拍動 */
        @keyframes elegant-flap-left {
            0%, 100% { transform: scaleX(1) rotate(0.5deg); }
            50% { transform: scaleX(0.22) rotate(-3deg); }
        }
        @keyframes elegant-flap-right {
            0%, 100% { transform: scaleX(1) rotate(-0.5deg); }
            50% { transform: scaleX(0.22) rotate(3deg); }
        }

        .wing-left {
            transform-box: view-box;
            transform-origin: 50px 50px;
            animation: elegant-flap-left 0.6s ease-in-out infinite alternate;
        }
        .wing-right {
            transform-box: view-box;
            transform-origin: 50px 50px;
            animation: elegant-flap-right 0.6s ease-in-out infinite alternate;
        }

        /* 錯開蝴蝶拍動頻率 */
        .bf-glass-1 .wing-left, .bf-glass-1 .wing-right { animation-delay: 0.15s; animation-duration: 0.55s; }
        .bf-glass-2 .wing-left, .bf-glass-2 .wing-right { animation-delay: 0.35s; animation-duration: 0.65s; }
        .bf-glass-3 .wing-left, .bf-glass-3 .wing-right { animation-delay: 0s; animation-duration: 0.58s; }

        /* 花草輕柔擺動動畫 */
        @keyframes flower-sway {
            0%, 100% { transform: rotate(-1.5deg); }
            50% { transform: rotate(1.5deg); }
        }
        .flower-sway {
            transform-origin: bottom center;
            animation: flower-sway 5s ease-in-out infinite alternate;
        }

        /* 暖光手電筒光圈 */
        .spotlight-beam {
            position: absolute;
            width: 170px;
            height: 170px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 244, 204, 0.95) 0%, rgba(254, 215, 170, 0.45) 55%, rgba(254, 215, 170, 0) 100%);
            mix-blend-mode: multiply;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 20;
            box-shadow: 0 0 25px rgba(254, 215, 170, 0.4);
            border: 2px dashed rgba(92, 64, 51, 0.12);
            transition: left 0.15s ease-out, top 0.15s ease-out;
        }

        /* 彩繪玻璃投射彩色光影 */
        .butterfly-glass-shadow {
            position: absolute;
            pointer-events: none;
            opacity: 0;
            filter: blur(16px) saturate(1.8);
            transform: scale(2.4) translate(18px, 18px);
            transition: opacity 0.35s ease, transform 0.35s ease;
            mix-blend-mode: multiply;
            z-index: 10;
        }

        /* 被照亮時的光影啟動 */
        .is-illuminated .butterfly-glass-shadow {
            opacity: 0.82;
            transform: scale(2.7) translate(25px, 25px) rotate(4deg);
        }

        .is-illuminated .butterfly-body {
            filter: drop-shadow(0 0 12px rgba(254, 215, 170, 0.7)) brightness(1.15);
            transform: scale(1.05);
        }

        .butterfly-body {
            transition: filter 0.3s ease, transform 0.3s ease;
        }

        /* 測驗選項卡 */
        .quiz-option {
            border: 2px solid #5c4033;
            background-color: #fffdfc;
            border-radius: 12px;
            transition: all 0.2s ease;
            box-shadow: 2px 3px 0px #5c4033;
        }

        .quiz-option:hover {
            transform: translateY(-2px);
            box-shadow: 4px 5px 0px #5c4033;
            background-color: #faf4ed;
        }

        /* 頁面過渡動畫 */
        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="w-screen h-screen flex flex-col justify-between p-4 relative watercolor-bg">

    <!-- 頂部：優雅的分頁導覽列 -->
    <header class="w-full z-50 flex flex-col gap-2">
        <div class="flex justify-between items-center">
            <!-- 象牙白手工紙質標題框 -->
            <div class="bg-[#fffdf9] border-2 border-[#5c4033] p-3 rounded-2xl watercolor-card text-[#5c4033] flex items-center gap-3">
                <span class="text-3xl">🌿</span>
                <div>
                    <h1 class="text-xl md:text-2xl font-black tracking-wider" style="font-family: 'Noto Serif TC', serif;">光影蝴蝶大探險</h1>
                </div>
            </div>

            <!-- 右側分數顯示（只有遊戲分頁看得見） -->
            <div id="game-score-badge" class="bg-[#f43f5e] border-2 border-[#5c4033] px-6 py-2 rounded-2xl watercolor-card text-white text-center min-w-[120px] flex flex-col justify-center">
                <span class="text-xs font-bold tracking-widest text-rose-100" style="font-family: 'Quicksand', sans-serif;">SCORE</span>
                <span id="score-text" class="text-3xl font-black transition-all duration-100">0</span>
            </div>
        </div>

        <!-- 分頁 Tab 按鈕 -->
        <nav class="flex gap-2 mt-2 border-b-2 border-[#5c4033] px-4">
            <button id="tab-learn" class="tab-btn active px-6 py-2 text-sm md:text-base">🗺️ 光影小學堂</button>
            <button id="tab-play" class="tab-btn px-6 py-2 text-sm md:text-base">🔦 光影大冒險</button>
            <button id="tab-quiz" class="tab-btn px-6 py-2 text-sm md:text-base">📝 小試身手</button>
        </nav>
    </header>

    <!-- 遊戲/學習/測驗主畫布區：中央素雅的微黃撕紙畫布 -->
    <main id="main-content" class="absolute inset-x-6 top-36 bottom-28 z-10 sketchy-canvas overflow-hidden p-6">
        
        <!-- ======================================================= -->
        <!-- 1. 光影小學堂 (KNOWLEDGE SECTION) -->
        <!-- ======================================================= -->
        <section id="section-learn" class="fade-in h-full flex flex-col justify-between">
            <div class="h-full flex flex-col justify-between">
                
                <!-- 小學堂分級切換（基礎觀察 vs 進階探索） -->
                <div class="flex gap-3 mb-3 justify-center text-xs md:text-sm">
                    <button id="btn-learn-basic" class="bg-[#5c4033] text-white px-4 py-1.5 rounded-full font-bold border border-[#5c4033] shadow-sm transition-all">
                        🌱 基礎生活觀察 (低年級)
                    </button>
                    <button id="btn-learn-advance" class="bg-white text-[#5c4033] px-4 py-1.5 rounded-full font-bold border border-[#5c4033] shadow-sm transition-all hover:bg-[#faf4ed]">
                        🔬 進階光影實驗室 (中高年級)
                    </button>
                </div>

                <!-- 知識卡片展示區 (由 JS 依據分級動態載入，附帶卡片 DOM ID 以供定位高亮) -->
                <div id="learn-cards-container" class="grid grid-cols-1 md:grid-cols-3 gap-6 h-[80%] overflow-y-auto pr-2 pb-4">
                    <!-- 卡片內容由 JS 依據選取的難度動態插入 -->
                </div>

            </div>
        </section>

        <!-- ======================================================= -->
        <!-- 2. 光影大冒險 (INTERACTIVE GAME SECTION) -->
        <!-- ======================================================= -->
        <!-- 採用 absolute inset-0 且溢出隱藏，讓背景水彩與植物能完全滿版延伸 -->
        <section id="section-play" class="fade-in absolute inset-0 hidden overflow-hidden">
            
            <!-- ================= 背景裝飾：手繪水彩山巒 (左右延伸滿版) ================= -->
            <div class="absolute inset-x-0 bottom-0 pointer-events-none opacity-20 z-0 h-40">
                <svg viewBox="0 0 1000 300" class="w-full h-full fill-[#a7f3d0]" preserveAspectRatio="none">
                    <path d="M0,160 Q190,90 360,150 T720,110 T1000,140 L1000,300 L0,300 Z" />
                </svg>
            </div>

            <!-- ================= 底部的滿版野生花卉與藤蔓 (參考未命名設計.jpg) ================= -->
            <div class="absolute inset-x-0 bottom-0 pointer-events-none z-20 h-32 overflow-hidden flex items-end">
                <svg viewBox="0 0 1440 250" class="w-full h-full" preserveAspectRatio="none">
                    <!-- 水彩手繪感地面線條 -->

                    <path d="M0,232 L1440,232 L1440,250 L0,250 Z" fill="#faf6f0" opacity="0.6"/>

                    <!-- 各式各樣的手繪花卉 (水彩漸層，微風搖曳) -->
                    <!-- 1. 左側橘黃高花 -->
                    <g class="flower-sway" style="transform-origin: 150px 230px;">

                    </g>

                    <!-- 4. 藍色果實 -->

                    </g>

                    <!-- 5. 吊鐘花 -->
                    <g class="flower-sway" style="transform-origin: 980px 230px; animation-delay: -1.5s;">
                        <path d="M980,230 Q970,140 985,80" stroke="#15803d" stroke-width="3" fill="none"/>
                        <ellipse cx="955" cy="75" rx="5" ry="8" fill="#fbbf24" stroke="#5c4033" stroke-width="2"/>

                    </g>

                    <!-- 6. 紫色大雛菊 -->
                    <g class="flower-sway" style="transform-origin: 1200px 230px; animation-delay: -3s;">

                        <circle cx="1205" cy="100" r="6" fill="#fde047" stroke="#5c4033" stroke-width="2"/>
                    </g>
                </svg>
            </div>

            <!-- ================= 地圖上散落的可照亮小雛菊 ================= -->
            <!-- 小花 1 -->
            <div id="flower-1" class="glow-flower absolute w-10 h-10 plant-sway-slow z-30" style="left: 12%; top: 48%;" data-x="12" data-y="48">
                <svg viewBox="0 0 100 100" class="w-full h-full drop-shadow-sm">
                    <path d="M50 50 L50 92 Q42 78 32 78" stroke="#047857" stroke-width="4.5" stroke-linecap="round" fill="none" />
                    <circle cx="50" cy="34" r="9" fill="#ffffff" stroke="#5c4033" stroke-width="2.5" />
                    <circle cx="50" cy="66" r="9" fill="#ffffff" stroke="#5c4033" stroke-width="2.5" />
                    <circle cx="34" cy="50" r="9" fill="#ffffff" stroke="#5c4033" stroke-width="2.5" />
                    <circle cx="66" cy="50" r="9" fill="#ffffff" stroke="#5c4033" stroke-width="2.5" />
                    <circle cx="50" cy="50" r="10" fill="#fbbf24" stroke="#5c4033" stroke-width="2.5"/>
                </svg>
            </div>
            <!-- 小花 2 -->
            <div id="flower-2" class="glow-flower absolute w-11 h-11 plant-sway-fast z-30" style="left: 84%; top: 32%;" data-x="84" data-y="32">
                <svg viewBox="0 0 100 100" class="w-full h-full drop-shadow-sm">
                    <path d="M50 50 L50 90 Q41 76 31 76" stroke="#047857" stroke-width="5" stroke-linecap="round" fill="none" />
                    <circle cx="50" cy="33" r="10" fill="#ffffff" stroke="#5c4033" stroke-width="2.5" />

                    <circle cx="33" cy="50" r="10" fill="#ffffff" stroke="#5c4033" stroke-width="2.5" />
                    <circle cx="67" cy="50" r="10" fill="#ffffff" stroke="#5c4033" stroke-width="2.5" />
                    <circle cx="50" cy="50" r="11" fill="#fbbf24" stroke="#5c4033" stroke-width="2.5"/>
                </svg>
            </div>

            <!-- ================= 三隻彩繪玻璃風格蝴蝶 ================= -->
            
            <!-- 【1號蝴蝶】粉紫藍彩繪玻璃蝴蝶 -->

                        <rect x="47" y="32" width="6" height="40" rx="3" fill="#5c4033" />

                </div>
                <!-- 實體 -->

                    <svg viewBox="0 0 100 100" class="w-full h-full drop-shadow-[3px_4px_0px_rgba(92,64,51,0.25)]">

                        </g>

                            <path d="M50 50 C80 12 98 18 92 46 C86 62 62 64 50 50 Z" fill="#5c4033" />
                            <path d="M54 47 C65 23 79 23 76 35 Z" fill="#a3e635" />
                            <path d="M76 35 C88 27 92 31 88 41 Z" fill="#fbbf24" />
                            <path d="M88 41 C84 51 68 53 57 48 Z" fill="#34d399" />
                            <path d="M71 39 C67 31 59 33 55 44 Z" fill="#84cc16" />
                        </g>
                        <rect x="47" y="32" width="6" height="40" rx="3" fill="#5c4033" />
                        <path d="M48 32 C45 22 36 18 28 21" stroke="#5c4033" stroke-width="2.5" stroke-linecap="round" fill="none" />
                        <path d="M52 32 C55 22 64 18 72 21" stroke="#5c4033" stroke-width="2.5" stroke-linecap="round" fill="none" />
                    </svg>
                </div>
            </div>

            <!-- 【3號蝴蝶】橘黃紅彩繪玻璃蝴蝶 -->
            <div id="bf-yellow" class="absolute w-24 h-24 bf-glass-3 transition-all duration-300 z-30" style="left: 48%; top: 45%;">
                <!-- 影子 -->
                <div class="butterfly-glass-shadow w-24 h-24 text-orange-500">
                    <svg viewBox="0 0 100 100" class="w-full h-full fill-current">
                        <path d="M50,50 C30,20 10,25 15,45 C18,55 35,60 50,50 C65,60 82,55 85,45 C90,25 70,20 50,50" />
                    </svg>
                </div>
                <!-- 實體 -->
                <div class="butterfly-body w-full h-full relative z-30">

                    <div>

                        <h3 class="text-base md:text-lg font-black mb-2 text-center" style="font-family: 'Noto Serif TC', serif;">${card.title}</h3>
                        <p class="text-xs md:text-sm leading-relaxed text-[#7a5e4e] text-justify">${card.desc}</p>
                    </div>
                    <div class="mt-4 w-full h-24 border border-[#5c4033]/20 rounded-lg overflow-hidden bg-[#faf6f0] flex items-center justify-center">
                        ${card.svg}
                    </div>
                `;
                container.appendChild(cardDiv);
            });
        }

        // 初始化小學堂「基礎觀察」與「進階實驗」切換按鈕事件
        const btnBasic = document.getElementById('btn-learn-basic');
        const btnAdvance = document.getElementById('btn-learn-advance');

        btnBasic.addEventListener('click', () => {
            currentLearnLevel = 'basic';
            playSound('page');
            btnBasic.className = "bg-[#5c4033] text-white px-4 py-1.5 rounded-full font-bold border border-[#5c4033] shadow-sm transition-all";
            btnAdvance.className = "bg-white text-[#5c4033] px-4 py-1.5 rounded-full font-bold border border-[#5c4033] shadow-sm transition-all hover:bg-[#faf4ed]";
            renderLearnCards();
        });

        btnAdvance.addEventListener('click', () => {
            currentLearnLevel = 'advance';
            playSound('page');
            btnAdvance.className = "bg-[#5c4033] text-white px-4 py-1.5 rounded-full font-bold border border-[#5c4033] shadow-sm transition-all";
            btnBasic.className = "bg-white text-[#5c4033] px-4 py-1.5 rounded-full font-bold border border-[#5c4033] shadow-sm transition-all hover:bg-[#faf4ed]";
            renderLearnCards();
        });

        // --- 3. 測驗相關數據 (已更新為對應小學堂的低年級題目) ---
        let quizScore = 0;
        let currentQuestionIndex = 0;
        const quizData = [
            {
                question: "1. 早上上學的時候，如果你面向東邊迎著太陽走，你會發現自己長長的小影子躲在你的哪一邊呢？ 🧭",
                options: [
                    { text: "躲在你的身體後面，跟太陽反方向 👣", correct: true },
                    { text: "跑到你的正前方，一直擋在路上 🛑", correct: false },
                    { text: "小影子會自己縮進口袋裡睡覺 🧥", correct: false }
                ],
                explanation: "答對了！影子永遠和發光的太陽唱反調。太陽在前面（東邊），影子就一定會躲在後面（西邊）喔！",
                linkedCardId: "learn-card-basic-opposite" // 對應「影子和太陽唱反調」
            },
            {
                question: "2. 美麗的彩繪玻璃蝴蝶照到光之後，能在地面或紙面上投射出「亮晶晶的彩色影子」，這是因為什麼呢？ 💎",
                options: [
                    { text: "定彩繪玻璃是『不透明』的，光完全進不去 🪵", correct: false },
                    { text: "因為彩繪玻璃是『半透明』的，能讓帶有色彩的光穿過去 ✨", correct: true },
                    { text: "因為小蝴蝶自己偷偷裝了彩色的亮亮小燈泡 💡", correct: false }
                ],
                explanation: "太棒了！半透明的彩色玻璃能讓光帶著美麗的顏色穿過去，所以投射出來的影子也是漂亮的彩色喔！",
                linkedCardId: "learn-card-adv-translucency" // 對應「透光度的秘密」
            },
            {
                question: "3. 下課時間，小明和小華並排站在一起開心地向太陽揮手，這時他們的影子會指向哪裡呢？ 👥",
                options: [
                    { text: "開照著同一顆太陽，所以大家的影子都會指向同一個方向 ➡️", correct: true },
                    { text: "一個影子指前面，另一個指後面 ↔️", correct: false },
                    { text: "他們的影子會開心地手拉手在原地轉圈圈 🎠", correct: false }
                ],
                explanation: "沒錯！同一個時間、同一個操場上只有一顆太陽照著大家，所以每個人的影子方向都是一樣的喔！",
                linkedCardId: "learn-card-basic-same" // 對應「大家都朝同一邊」
            }
        ];

        // 取得 DOM 元素
        const lightBeam = document.getElementById('light-beam');
        const cartoonFlashlight = document.getElementById('cartoon-flashlight');
        const scoreText = document.getElementById('score-text');
        const victoryModal = document.getElementById('victory-modal');
        const victoryCard = document.getElementById('victory-card');
        const btnRestart = document.getElementById('btn-restart');
        
        // 取得 Tab 元素與分頁
        const tabLearn = document.getElementById('tab-learn');
        const tabPlay = document.getElementById('tab-play');
        const tabQuiz = document.getElementById('tab-quiz');
        
        const sectionLearn = document.getElementById('section-learn');
        const sectionPlay = document.getElementById('section-play');
        const sectionQuiz = document.getElementById('section-quiz');
        const footerControls = document.getElementById('footer-controls');
        const gameScoreBadge = document.getElementById('game-score-badge');

        // --- 4. 療癒系手繪質感音效系統 (Web Audio API) ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function playSound(soundType) {
            try {
                if (!audioCtx) audioCtx = new AudioContext();
                
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);

                if (soundType === 'move') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(320, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(580, audioCtx.currentTime + 0.08);
                    gain.gain.setValueAtTime(0.015, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.08);
                } else if (soundType === 'score') {
                    const now = audioCtx.currentTime;
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(587.33, now); // D5
                    osc.frequency.setValueAtTime(880.00, now + 0.08); // A5
                    gain.gain.setValueAtTime(0.05, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
                    osc.start();
                    osc.stop(now + 0.4);
                } else if (soundType === 'page') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.15);
                    gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.15);
                } else if (soundType === 'victory') {
                    const notes = [523.25, 659.25, 783.99, 1046.50]; 
                    notes.forEach((freq, index) => {
                        const noteOsc = audioCtx.createOscillator();
                        const noteGain = noteOsc.createGain();
                        noteOsc.connect(noteGain);
                        noteGain.connect(audioCtx.destination);
                        noteOsc.type = 'sine';
                        noteOsc.frequency.setValueAtTime(freq, audioCtx.currentTime + index * 0.08);
                        noteGain.gain.setValueAtTime(0.04, audioCtx.currentTime + index * 0.08);
                        noteGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + index * 0.08 + 0.4);
                        noteOsc.start(audioCtx.currentTime + index * 0.08);
                        noteOsc.stop(audioCtx.currentTime + index * 0.08 + 0.45);
                    });
                } else if (soundType === 'wrong') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(220, audioCtx.currentTime);
                    osc.frequency.linearRampToValueAtTime(150, audioCtx.currentTime + 0.25);
                    gain.gain.setValueAtTime(0.02, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.25);
                }
            } catch (e) {
                console.log('Audio Context initialized.');
            }
        }

        // --- 5. 分頁切換功能 (Tab Switching) ---
        function switchTab(tabId) {
            currentTab = tabId;
            playSound('page');

            tabLearn.classList.remove('active');
            tabPlay.classList.remove('active');
            tabQuiz.classList.remove('active');

            sectionLearn.classList.add('hidden');
            sectionPlay.classList.add('hidden');
            sectionQuiz.classList.add('hidden');
            footerControls.classList.add('hidden');
            gameScoreBadge.classList.add('hidden');

            if (tabId === 'learn') {
                tabLearn.classList.add('active');
                sectionLearn.classList.remove('hidden');
                renderLearnCards(); // 進入學堂時即渲染卡片
            } else if (tabId === 'play') {
                tabPlay.classList.add('active');
                sectionPlay.classList.remove('hidden');
                footerControls.classList.remove('hidden');
                gameScoreBadge.classList.remove('hidden');
                updateFlashlightPosition();
            } else if (tabId === 'quiz') {
                tabQuiz.classList.add('active');
                sectionQuiz.classList.remove('hidden');
                loadQuizQuestion(0);
            }
        }

        // 【智慧型關聯與高亮函數】：點選溫習時，先判斷該卡片在哪個難度分級中，設定好後再跳轉滾動高亮
        function highlightLearnCard(cardId) {
            // 根據 ID 前綴判斷屬於 basic (低年級) 還是 advance (中高年級)
            const targetLevel = cardId.includes('-basic-') ? 'basic' : 'advance';
            
            // 1. 先設定分級狀態
            currentLearnLevel = targetLevel;
            
            // 2. 切換小學堂頂部按鈕樣式
            if (targetLevel === 'basic') {
                btnBasic.className = "bg-[#5c4033] text-white px-4 py-1.5 rounded-full font-bold border border-[#5c4033] shadow-sm transition-all";
                btnAdvance.className = "bg-white text-[#5c4033] px-4 py-1.5 rounded-full font-bold border border-[#5c4033] shadow-sm transition-all hover:bg-[#faf4ed]";
            } else {
                btnAdvance.className = "bg-[#5c4033] text-white px-4 py-1.5 rounded-full font-bold border border-[#5c4033] shadow-sm transition-all";
                btnBasic.className = "bg-white text-[#5c4033] px-4 py-1.5 rounded-full font-bold border border-[#5c4033] shadow-sm transition-all hover:bg-[#faf4ed]";
            }

            // 3. 切換到學堂分頁並重新渲染卡片
            switchTab('learn');

            // 4. 等待 DOM 渲染完畢後，平滑捲動到該卡片並播放呼吸燈閃爍動畫
            setTimeout(() => {
                const card = document.getElementById(cardId);
                const container = document.getElementById('main-content');
                if (card && container) {
                    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    
                    // 加上呼吸發光特效
                    card.classList.add('highlight-pulse');
                    
                    // 3.6秒後移除呼吸燈特效
                    setTimeout(() => {
                        card.classList.remove('highlight-pulse');
                    }, 3600);
                }
            }, 350);
        }

        tabLearn.addEventListener('click', () => switchTab('learn'));
        tabPlay.addEventListener('click', () => switchTab('play'));
        tabQuiz.addEventListener('click', () => switchTab('quiz'));

        // --- 6. 手電筒大冒險遊戲核心渲染 ---
        function updateFlashlightPosition() {
            if (!isGameActive || currentTab !== 'play') return;

            // 限制邊界在安全區
            flashX = Math.max(5, Math.min(95, flashX));
            flashY = Math.max(5, Math.min(95, flashY));

            // 更新暖光發光圈位置
            lightBeam.style.left = `${flashX}%`;
            lightBeam.style.top = `${flashY}%`;

            // 更新手電筒本體位置
            cartoonFlashlight.style.left = `${flashX}%`;
            cartoonFlashlight.style.top = `${flashY}%`;

            checkCollisions();
            checkFlowerIllumination();
        }

        // 碰撞與彩繪玻璃光影偵測系統
        function checkCollisions() {
            if (!isGameActive || currentTab !== 'play') return;

            butterflies.forEach(bf => {
                const dx = bf.x - flashX;
                const dy = bf.y - flashY;
                const distance = Math.sqrt(dx * dx + dy * dy);

                const element = document.getElementById(bf.id);

                if (distance < 14) {
                    if (!bf.isIlluminated) {
                        bf.isIlluminated = true;
                        element.classList.add('is-illuminated');
                        handleScore(bf);
                    }
                } else {
                    if (bf.isIlluminated) {
                        bf.isIlluminated = false;
                        element.classList.remove('is-illuminated');
                    }
                }
            });
        }

        // 背景小雛菊發光
        function checkFlowerIllumination() {
            flowers.forEach(fl => {
                const dx = fl.x - flashX;
                const dy = fl.y - flashY;
                const distance = Math.sqrt(dx * dx + dy * dy);
                const element = document.getElementById(fl.id);

                if (distance < 14) {
                    element.classList.add('is-glowing-flower');
                } else {
                    element.classList.remove('is-glowing-flower');
                }
            });
        }

        // 照到蝴蝶加分 & 蝴蝶隨機位置瞬移
        function handleScore(butterfly) {
            score += 1;
            scoreText.textContent = score;
            playSound('score');

            scoreText.classList.remove('scale-100');
            scoreText.classList.add('scale-150', 'text-yellow-300');
            setTimeout(() => {
                scoreText.classList.remove('scale-150', 'text-yellow-300');
                scoreText.classList.add('scale-100');
            }, 150);

            if (score === 10) {
                triggerVictory();
            }

            setTimeout(() => {
                const element = document.getElementById(butterfly.id);
                
                butterfly.x = Math.floor(Math.random() * 70) + 15;
                butterfly.y = Math.floor(Math.random() * 50) + 15;
                
                element.style.left = `${butterfly.x}%`;
                element.style.top = `${butterfly.y}%`;

                butterfly.isIlluminated = false;
                element.classList.remove('is-illuminated');
            }, 600);
        }

        function triggerVictory() {
            isGameActive = false; 
            playSound('victory'); 
            
            setTimeout(() => {
                victoryModal.classList.remove('opacity-0', 'pointer-events-none');
                victoryCard.classList.remove('scale-90');
                victoryCard.classList.add('scale-100');
            }, 500);
        }

        // 重置大冒險遊戲
        btnRestart.addEventListener('click', () => {
            victoryModal.classList.add('opacity-0', 'pointer-events-none');
            victoryCard.classList.remove('scale-100');
            victoryCard.classList.add('scale-90');

            score = 0;
            scoreText.textContent = score;
            isGameActive = true;
            
            butterflies[0].x = 20; butterflies[0].y = 35;
            butterflies[1].x = 72; butterflies[1].y = 22;
            butterflies[2].x = 48; butterflies[2].y = 52;
            
            butterflies.forEach(bf => {
                const element = document.getElementById(bf.id);
                element.style.left = `${bf.x}%`;
                element.style.top = `${bf.y}%`;
                element.classList.remove('is-illuminated');
            });

            updateFlashlightPosition();
        });

        // --- 7. 小試身手評量功能 (Quiz System) ---
        const quizQuestion = document.getElementById('quiz-question');
        const quizOptionsGrid = document.getElementById('quiz-options-grid');
        const quizProgress = document.getElementById('quiz-progress');
        const quizCompleteModal = document.getElementById('quiz-complete-modal');
        const quizCompleteCard = document.getElementById('quiz-complete-card');
        const quizScoreDisplay = document.getElementById('quiz-score-display');
        const quizEvalText = document.getElementById('quiz-eval-text');
        const btnQuizRetry = document.getElementById('btn-quiz-retry');

        function loadQuizQuestion(index) {
            currentQuestionIndex = index;
            if (index === 0) {
                quizScore = 0;
            }

            const q = quizData[index];
            quizProgress.textContent = `Question ${index + 1} of ${quizData.length}`;
            quizQuestion.textContent = q.question;

            quizOptionsGrid.innerHTML = '';

            q.options.forEach((opt, oIdx) => {
                const btn = document.createElement('button');
                btn.className = "quiz-option w-full p-4 text-left font-semibold text-sm text-[#5c4033] flex justify-between items-center";
                btn.innerHTML = `<span>${opt.text}</span> <span class="text-xs text-amber-600 opacity-0 transition-opacity">選擇 ➔</span>`;
                
                // 傳遞此題目的 linkedCardId 給回答處理函式
                btn.addEventListener('click', () => handleQuizAnswer(opt.correct, q.explanation, q.linkedCardId));
                quizOptionsGrid.appendChild(btn);
            });
        }

        // 答題回饋
        function handleQuizAnswer(isCorrect, explanation, linkedCardId) {
            if (isCorrect) {
                quizScore++;
                playSound('score');
                showExplanationModal("🌿 太棒了，答對了！", explanation, true, linkedCardId);
            } else {
                playSound('wrong');
                showExplanationModal("🌸 再想一想，你可以的！", explanation, false, linkedCardId);
            }
        }

        // 答題解析說明對話框：新增一個溫習按鈕，可以將畫面跳轉到學堂的關聯卡片上
        function showExplanationModal(title, text, isCorrect, linkedCardId) {
            const explanationModal = document.createElement('div');
            explanationModal.className = "fixed inset-0 bg-[#5c4033]/60 backdrop-blur-xs z-50 flex items-center justify-center fade-in";
            
            explanationModal.innerHTML = `
                <div class="bg-[#fffdf9] border-4 border-[#5c4033] p-6 rounded-3xl shadow-[6px_6px_0px_#5c4033] text-center max-w-sm mx-4 text-[#5c4033]">
                    <span class="text-5xl block mb-2">${isCorrect ? '✨' : '🎨'}</span>
                    <h3 class="text-xl font-black mb-2" style="font-family: 'Noto Serif TC', serif;">${title}</h3>
                    <p class="text-sm text-[#7a5e4e] mb-5 leading-relaxed text-justify">${text}</p>
                    
                    <!-- 按鈕群 -->
                    <div class="flex flex-col gap-2">
                        <!-- 溫習按鈕 -->
                        <button id="btn-go-learn" class="w-full bg-amber-100 hover:bg-amber-200 border-2 border-[#5c4033] text-[#5c4033] font-bold py-2 rounded-xl active:translate-y-0.5 transition-all text-sm flex items-center justify-center gap-1.5 shadow-[2px_2px_0px_#5c4033]">
                            📖 前往學堂溫習這個原理
                        </button>
                        <!-- 下一題按鈕 -->
                        <button id="btn-next-question" class="w-full bg-[#f43f5e] hover:bg-rose-600 border-2 border-[#5c4033] text-white font-black py-2.5 rounded-xl shadow-[3px_3px_0px_#5c4033] active:translate-y-0.5 active:shadow-none transition-all text-sm">
                            ${currentQuestionIndex === quizData.length - 1 ? '看成績 🏆' : '下一題 ➔'}
                        </button>
                    </div>
                </div>
            `;
            document.body.appendChild(explanationModal);

            // 1. 溫習按鈕點擊：關閉彈窗並呼叫關聯高亮機制
            document.getElementById('btn-go-learn').addEventListener('click', () => {
                document.body.removeChild(explanationModal);
                highlightLearnCard(linkedCardId);
            });

            // 2. 下一題按鈕點擊：繼續作答
            document.getElementById('btn-next-question').addEventListener('click', () => {
                document.body.removeChild(explanationModal);
                
                if (currentQuestionIndex < quizData.length - 1) {
                    loadQuizQuestion(currentQuestionIndex + 1);
                } else {
                    showQuizResults();
                }
            });
        }

        function showQuizResults() {
            playSound('victory');
            quizScoreDisplay.textContent = `得分：${quizScore} / ${quizData.length} 題`;
            
            if (quizScore === quizData.length) {
                quizEvalText.textContent = "太神奇了！你已經是名副其實的「光影探索小尖兵」了喔！🎖️";
            } else if (quizScore >= 1) {
                quizEvalText.textContent = "很棒的嘗試！你對影子已經有深刻的認識，再挑戰一局吧！🌿";
            } else {
                quizEvalText.textContent = "別氣餒，先去【光影小學堂】看小故事，一定能拿到滿分！🌸";
            }

            quizCompleteModal.classList.remove('opacity-0', 'pointer-events-none');
            quizCompleteCard.classList.remove('scale-90');
            quizCompleteCard.classList.add('scale-100');
        }

        btnQuizRetry.addEventListener('click', () => {
            quizCompleteModal.classList.add('opacity-0', 'pointer-events-none');
            quizCompleteCard.classList.remove('scale-100');
            quizCompleteCard.classList.add('scale-90');
            loadQuizQuestion(0);
        });

        // --- 8. 鍵盤事件（移動手電筒） ---
        window.addEventListener('keydown', (e) => {
            if (!isGameActive || currentTab !== 'play') return;

            let moved = false;
            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    flashY -= stepSize;
                    moved = true;
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    flashY += stepSize;
                    moved = true;
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    flashX -= stepSize;
                    moved = true;
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    flashX += stepSize;
                    moved = true;
                    break;
            }

            if (moved) {
                e.preventDefault(); 
                playSound('move');
                updateFlashlightPosition();
            }
        });

        // --- 9. 行動裝置與搖桿按鈕 ---
        const moveUp = () => { if (!isGameActive || currentTab !== 'play') return; flashY -= stepSize; playSound('move'); updateFlashlightPosition(); };
        const moveDown = () => { if (!isGameActive || currentTab !== 'play') return; flashY += stepSize; playSound('move'); updateFlashlightPosition(); };
        const moveLeft = () => { if (!isGameActive || currentTab !== 'play') return; flashX -= stepSize; playSound('move'); updateFlashlightPosition(); };
        const moveRight = () => { if (!isGameActive || currentTab !== 'play') return; flashX += stepSize; playSound('move'); updateFlashlightPosition(); };

        document.getElementById('btn-up').addEventListener('click', moveUp);
        document.getElementById('btn-down').addEventListener('click', moveDown);
        document.getElementById('btn-left').addEventListener('click', moveLeft);
        document.getElementById('btn-right').addEventListener('click', moveRight);

        // 初始化
        switchTab('learn'); 

    </script>
</body>
